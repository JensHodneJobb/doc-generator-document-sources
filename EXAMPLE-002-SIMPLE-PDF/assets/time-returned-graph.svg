<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Time Returned Per Week</title>
  <desc id="desc">A line chart showing weekly hours returned increasing over three months.</desc>

  <defs>
    <style>
      .bg { fill: #eaf7f3; }
      .panel { fill: #f5fbf8; stroke: #b7e2d2; stroke-width: 3; }
      .axis { stroke: #2f3b45; stroke-width: 3; }
      .grid { stroke: #c8d8d0; stroke-width: 1.5; }
      .label { font: 28px Calibri, Arial, sans-serif; fill: #2f3b45; }
      .title { font: 44px Calibri, Arial, sans-serif; fill: #0f766e; font-weight: 700; }
      .line { fill: none; stroke: #0f766e; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #0f766e; }
      .callout { font: 24px Calibri, Arial, sans-serif; fill: #115e59; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760" rx="28" />
  <rect class="panel" x="64" y="54" width="1072" height="652" rx="22" />

  <text class="title" x="110" y="122">Time Returned Per Week</text>

  <line class="axis" x1="160" y1="620" x2="1040" y2="620" />
  <line class="axis" x1="160" y1="620" x2="160" y2="180" />

  <line class="grid" x1="160" y1="535" x2="1040" y2="535" />
  <line class="grid" x1="160" y1="450" x2="1040" y2="450" />
  <line class="grid" x1="160" y1="365" x2="1040" y2="365" />
  <line class="grid" x1="160" y1="280" x2="1040" y2="280" />

  <text class="label" x="104" y="626" text-anchor="end">0 h</text>
  <text class="label" x="104" y="541" text-anchor="end">2 h</text>
  <text class="label" x="104" y="456" text-anchor="end">4 h</text>
  <text class="label" x="104" y="371" text-anchor="end">6 h</text>
  <text class="label" x="104" y="286" text-anchor="end">8 h</text>

  <polyline class="line" points="210,595 430,535 650,450 870,365 1010,322" />

  <circle class="dot" cx="210" cy="595" r="11" />
  <circle class="dot" cx="430" cy="535" r="11" />
  <circle class="dot" cx="650" cy="450" r="11" />
  <circle class="dot" cx="870" cy="365" r="11" />
  <circle class="dot" cx="1010" cy="322" r="11" />

  <text class="label" x="210" y="668" text-anchor="middle">Month 1</text>
  <text class="label" x="430" y="668" text-anchor="middle">Month 2</text>
  <text class="label" x="650" y="668" text-anchor="middle">Month 3</text>
  <text class="label" x="870" y="668" text-anchor="middle">Month 4</text>
  <text class="label" x="1010" y="668" text-anchor="middle">Month 5</text>

  <text class="callout" x="950" y="280">+6.4 h/week</text>
</svg>